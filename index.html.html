<!DOCTYPE html>
<html>
<head>
<title>CUET UG 2026 Mock Test</title>

<style>
body{
    margin:0;
    font-family: Arial;
    text-align:center;
    background:#eef2f3;
}

.header{
    background:#111;
    color:white;
    padding:40px;
}

.header h1{
    font-size:50px;
}

.header p{
    font-size:20px;
}

.btn{
    padding:12px 20px;
    margin:10px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

.container{
    padding:20px;
}

.hidden{
    display:none;
}

.question{
    margin:10px;
    text-align:left;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>MOCK TEST FOR CUET UG 2026</h1>
    <p>Easy to Apply • Easy to Crack</p>
</div>

<div class="container">

<!-- HOME -->
<div id="home">
    <h2>Free Mock Tests</h2>
    <button class="btn" onclick="startTest('eng_free')">English Free Test</button>
    <button class="btn" onclick="startTest('gat_free')">GAT Free Test</button>

    <h2>Paid Mock Tests</h2>
    <button class="btn" onclick="showPayment()">Attempt Paid Tests</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
    <h2 id="title"></h2>
    <form id="quizForm"></form>
    <button class="btn" onclick="submitTest()">Submit</button>
    <h3 id="result"></h3>
</div>

<!-- PAYMENT -->
<div id="payment" class="hidden">
    <h2>🔒 Unlock Paid Mock Tests</h2>
    <p>Pay ₹5–₹10 to continue</p>

    <!-- 🔴 YAHAN APNA PAYMENT LINK DAALO -->
    <a href="PASTE_YOUR_PAYMENT_LINK_HERE">
        <button class="btn">Pay Now</button>
    </a>

    <br><br>
    <button class="btn" onclick="showPaidTests()">I Have Paid</button>
</div>

<!-- PAID TEST LIST -->
<div id="paidTests" class="hidden">
    <h2>Choose Test</h2>

    <h3>English Mock Tests</h3>
    <button class="btn" onclick="startTest('eng1')">English Test 1</button>
    <button class="btn" onclick="startTest('eng2')">English Test 2</button>
    <button class="btn" onclick="startTest('eng3')">English Test 3</button>
    <button class="btn" onclick="startTest('eng4')">English Test 4</button>
    <button class="btn" onclick="startTest('eng5')">English Test 5</button>

    <h3>GAT Mock Tests</h3>
    <button class="btn" onclick="startTest('gat1')">GAT Test 1</button>
    <button class="btn" onclick="startTest('gat2')">GAT Test 2</button>
    <button class="btn" onclick="startTest('gat3')">GAT Test 3</button>
    <button class="btn" onclick="startTest('gat4')">GAT Test 4</button>
    <button class="btn" onclick="startTest('gat5')">GAT Test 5</button>
</div>

</div>

<script>

function startTest(type){
    document.getElementById("home").style.display="none";
    document.getElementById("payment").style.display="none";
    document.getElementById("paidTests").style.display="none";
    document.getElementById("quiz").style.display="block";

    let form=document.getElementById("quizForm");
    form.innerHTML="";

    document.getElementById("title").innerText="Test - "+type+" (50 Questions)";

    for(let i=1;i<=50;i++){
        form.innerHTML+=`
        <div class="question">
        <p>${i}. Sample Question ${i}</p>
        <input type="radio" name="q${i}" value="1"> Option A<br>
        <input type="radio" name="q${i}" value="0"> Option B<br>
        </div>`;
    }
}

function submitTest(){
    let score=0;
    let form=document.forms["quizForm"];

    for(let i=1;i<=50;i++){
        let q=form["q"+i];
        for(let j=0;j<q.length;j++){
            if(q[j].checked && q[j].value=="1"){
                score++;
            }
        }
    }

    document.getElementById("result").innerText="Score: "+score+"/50";
}

function showPayment(){
    document.getElementById("home").style.display="none";
    document.getElementById("payment").style.display="block";
}

function showPaidTests(){
    document.getElementById("payment").style.display="none";
    document.getElementById("paidTests").style.display="block";
}

</script>

</body>
</html>
